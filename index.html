      </div>
      <div style="background:rgba(239,68,68,.07);border-radius:14px;padding:14px;border:1px solid rgba(239,68,68,.15)">
        <div style="font-family:JetBrains Mono,monospace;font-size:.46rem;color:var(--r);letter-spacing:1.5px;margin-bottom:5px">↓ EXPENSES</div>
        <div style="font-family:Sora,sans-serif;font-size:1.5rem;font-weight:800;color:var(--r)">${fmt(d.ts)}</div>
      </div>
    </div>
    ${(d.ti>0||d.ts>0)?`<div><div style="display:flex;justify-content:space-between;font-family:JetBrains Mono,monospace;font-size:.46rem;color:var(--t3);margin-bottom:5px"><span>Net this month</span><span style="color:${d.net>=0?"var(--g)":"var(--r)"};font-weight:700">${d.net>=0?"+":""}${fmt(d.net)}</span></div><div style="display:flex;border-radius:6px;overflow:hidden;height:6px"><div style="flex:${Math.max(d.ti,.001)};background:var(--g);opacity:.7"></div><div style="flex:${Math.max(d.ts,.001)};background:var(--r);opacity:.7"></div></div></div>`:""}
  </div>`;

  if(d.nbar.some(x=>x.inc>0||x.exp>0))h+=`<div class="card"><div class="sh"><div class="st">6-Month Overview</div></div>
    <div style="display:flex;gap:12px;margin-bottom:10px">
      ${[{l:"Income",c:"var(--g)"},{l:"Expenses",c:"var(--r)"}].map(x=>`<div style="display:flex;align-items:center;gap:5px;font-family:JetBrains Mono,monospace;font-size:.48rem;color:var(--t3)"><div style="width:10px;height:10px;border-radius:2px;background:${x.c};opacity:.8"></div>${x.l}</div>`).join("")}
    </div>
    ${dbsvg(d.nbar)}</div>`;

  h+=`<div class="card"><div class="sh"><div class="st">Income Log</div>
    <button class="btn sm" onclick="togIF()">${S.showIF?"Cancel":"+ Add"}</button></div>`;
  if(S.showIF)h+=`<div style="background:var(--bg3);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid var(--b2)">
    <label class="lbl">Description</label><input id="idesc" class="inp" type="text" placeholder="Monthly salary, Freelance…" value="${xe(S.iF.desc)}" oninput="S.iF.desc=this.value" autofocus/>
    <div class="g2"><div><label class="lbl">Amount ($)</label><input id="iamt" class="inp" type="number" inputmode="decimal" placeholder="0.00" value="${S.iF.amt}" oninput="S.iF.amt=this.value"/></div>
    <div><label class="lbl">Date</label><input class="inp" type="date" value="${S.iF.date}" oninput="S.iF.date=this.value"/></div></div>
    <label class="lbl">Source</label><select class="inp" onchange="S.iF.src=this.value">${ISRC.map(s=>`<option${s===S.iF.src?" selected":""}>${s}</option>`).join("")}</select>
    <button class="btn" onclick="saveInc()">${S.editIid?"Update Income":"Log Income"}</button></div>`;
  if(!S.inc.length&&!S.showIF)h+=`<div class="empty"><div class="ei">💰</div><p>No income logged yet.<br/>Add salary, freelance, or any earnings.</p></div>`;
  else if(S.inc.length){
    const bySrc=ISRC.map(s=>({s,tot:S.inc.filter(i=>i.src===s||i.source===s).reduce((a,i)=>a+i.amount,0)})).filter(x=>x.tot>0).sort((a,b)=>b.tot-a.tot);
    const totInc=S.inc.reduce((a,i)=>a+i.amount,0);
    if(bySrc.length>1)h+=`<div style="margin-bottom:14px">${bySrc.map(x=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="font-family:JetBrains Mono,monospace;font-size:.56rem;color:var(--t2);width:82px;flex-shrink:0">${x.s}</div><div style="flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--g);width:${totInc>0?(x.tot/totInc*100):0}%;opacity:.85"></div></div><div style="font-family:Sora,sans-serif;font-size:.82rem;font-weight:700;flex-shrink:0;width:72px;text-align:right">${fmt(x.tot)}</div></div>`).join("")}</div>`;
    S.inc.forEach(i=>{h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b)">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0">💰</div>
      <div style="flex:1;min-width:0"><div style="font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${xe(i.description)}</div><div style="font-family:JetBrains Mono,monospace;font-size:.48rem;color:var(--t3);margin-top:2px">${i.src||i.source||"—"} · ${i.date}</div></div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><div style="font-family:Sora,sans-serif;font-size:1rem;font-weight:800;color:var(--g)">+${fmt(i.amount)}</div>
      <button class="ib" onclick="editInc(${JSON.stringify(String(i.id))})">✏️</button>
      <button class="ib" onclick="delInc(${JSON.stringify(String(i.id))})">🗑️</button></div></div>`;});
  }
  h+=`</div>`;

  h+=`<div class="card"><div class="sh"><div class="st">Bill Reminders</div>
    <span class="badge ${S.notifOn&&S.notifPerm==="granted"?"bg":"bdim"}">${S.notifOn&&S.notifPerm==="granted"?"On":"Off"}</span></div>
    <div style="font-family:JetBrains Mono,monospace;font-size:.58rem;color:var(--t3);line-height:1.8;margin-bottom:14px">Get browser notifications when bills are overdue or due in 3 days.</div>
    ${S.notifPerm==="denied"?`<div style="background:rgba(239,68,68,.08);border-radius:12px;padding:12px;border:1px solid rgba(239,68,68,.15)"><div style="font-family:JetBrains Mono,monospace;font-size:.56rem;color:var(--r);line-height:1.8">⚠ Notifications blocked. Go to browser site settings → allow → reload.</div></div>`
    :`<button class="btn${S.notifOn&&S.notifPerm==="granted"?" ghost":""}" onclick="togNotif()">${S.notifOn&&S.notifPerm==="granted"?"Disable Reminders":"Enable Reminders 🔔"}</button>`}
    ${S.notifOn&&S.notifPerm==="granted"?`<button class="btn ghost" onclick="doNotif()">Send Test Notification</button>`:""}
  </div>`;
  return h;
}

// ── Main render ───────────────────────────────────────────
function render(){
  const d=D();
  // Theme
  document.body.className=S.dark?"":"light";
  $("hmon").textContent=`${FMO[d.now.getMonth()]} ${d.now.getFullYear()}`;
  $("bthm").textContent=S.dark?"☀️":"🌙";
  $("bnot").textContent=S.notifOn&&S.notifPerm==="granted"?"🔔":"🔕";
  // Nav
  $("nav").innerHTML=NAVS.map(n=>{
    const on=S.view===n.id;
    const badge=n.id==="dues"&&d.dc>0?`<div class="nbadge red">${d.dc}</div>`:n.id==="bills"&&d.bd>0?`<div class="nbadge am">!</div>`:"";
    return`<button class="ni${on?" on":""}" onclick="goto('${n.id}')" aria-label="${n.lb}" aria-current="${on?"page":"false"}">
      <div style="position:relative;display:flex;align-items:center;justify-content:center">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${on?"var(--a)":"var(--t3)"}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${n.ic}"/></svg>
        ${badge}
      </div>
      <div class="nd"></div>
      <span class="nl">${n.lb}</span>
    </button>`;
  }).join("");
  // Page
  let html="";
  if(S.view==="dash")html=renderDash(d);
  else if(S.view==="bud")html=renderBud(d);
  else if(S.view==="rep")html=renderRep(d);
  else if(S.view==="bills")html=renderBills();
  else if(S.view==="dues")html=renderDues();
  else if(S.view==="worth")html=renderWorth(d);
  $("pg").innerHTML=html;
  // FAB
  $("fab").style.display=$("as").classList.contains("open")||$("sov").classList.contains("open")?"none":"flex";
}

// ── Actions ───────────────────────────────────────────────
function goto(v){vib(5);S.view=v;S.showRF=false;S.showUF=false;S.showIF=false;render();$("scr").scrollTo({top:0,behavior:"smooth"});}

function openAdd(id=null){
  S.editEid=id;
  const e=id?S.exp.find(x=>String(x.id)===String(id)):null;
  $("atitle").textContent=e?"Edit Expense":"New Expense";
  $("asub").textContent=e?"Save Changes":"Add Expense";
  $("famt").value=e?e.amount:"";
  $("fdesc").value=e?e.description:"";
  $("fdate").value=e?e.date:today();
  $("fnotes").value=e?e.notes||"":"";
  buildCats(e?e.category:CATS[0].name);
  buildQas();
  $("as").classList.add("open");
  setTimeout(()=>$("famt").focus(),200);
}
function openEdit(id){openAdd(id);}
function closeAdd(){$("as").classList.remove("open");S.editEid=null;render();}

function buildQas(){
  $("fqas").innerHTML=[5,10,20,50,100].map(a=>`<div class="qa" onclick="this.parentNode.querySelectorAll('.qa').forEach(q=>q.classList.remove('on'));this.classList.add('on');$('famt').value='${a}'">${a}</div>`).join("");
}
function buildCats(sel){
  $("fcats").innerHTML=CATS.map(c=>`<div class="ct${(sel||CATS[0].name)===c.name?" on":""}" style="--cc:${c.c};--cg:${c.g}" data-cat="${c.name}" onclick="selCat(this)"><span class="ce">${c.e}</span><span class="cn">${c.name.split(" ")[0]}</span></div>`).join("");
}
function selCat(el){document.querySelectorAll(".ct").forEach(x=>x.classList.remove("on"));el.classList.add("on");}

function submitAdd(){
  const amt=parseFloat($("famt").value);
  const desc=$("fdesc").value.trim();
  const catEl=document.querySelector(".ct.on");
  const catName=catEl?catEl.dataset.cat:CATS[0].name;
  const dt=$("fdate").value||today();
  const notes=$("fnotes").value.trim();
  if(!amt||amt<=0){toast("Enter a valid amount","err");return;}
  if(!desc){toast("Add a description","err");return;}
  const entry={amount:parseFloat(amt.toFixed(2)),description:desc,category:catName,date:dt,notes};
  if(S.editEid){
    const prev=S.exp.find(e=>String(e.id)===String(S.editEid));
    S.exp=S.exp.map(e=>String(e.id)===String(S.editEid)?{...e,...entry}:e);
    sv();toast("Updated ✓","ok",()=>{S.exp=S.exp.map(e=>String(e.id)===String(prev.id)?prev:e);sv();render();});
  }else{
    const id=uid();S.isNew=false;
    S.exp=[{id,...entry},...S.exp];
    sv();vib(8);toast("Logged ✓","ok",()=>{S.exp=S.exp.filter(e=>e.id!==id);sv();render();});
  }
  closeAdd();
}

function delExp(id){const del=S.exp.find(e=>String(e.id)===String(id));if(!del)return;S.exp=S.exp.filter(e=>String(e.id)!==String(id));sv();vib(10);toast("Deleted","ok",()=>{S.exp=[del,...S.exp];sv();render();});render();}

let _budSaved=false;
function saveBud(){
  if(_budSaved||!$("budinp"))return;
  _budSaved=true;setTimeout(()=>_budSaved=false,300);
  const v=parseFloat($("budinp").value);
  if(v>0){S.bud=v;LS.s("bud",v);S.adism=null;toast("Budget updated ✓");}
  S.editBud=false;render();
}

// Bills
function togRF(){if(S.showRF){S.editRid=null;S.rF={name:"",amt:"",cat:CATS[0].name,freq:"Monthly",nxt:today()};}S.showRF=!S.showRF;render();}
function editRec(id){const r=S.rec.find(x=>String(x.id)===String(id));if(!r)return;S.editRid=id;S.rF={name:r.name,amt:String(r.amt),cat:r.cat,freq:r.freq,nxt:r.nxt};S.showRF=true;render();}
function saveRec(){
  if(!S.rF.name.trim()||!S.rF.amt||+S.rF.amt<=0){toast("Fill in all fields","err");return;}
  const wasEdit=!!S.editRid;
  if(S.editRid)S.rec=S.rec.map(r=>String(r.id)===String(S.editRid)?{...r,...S.rF,amt:parseFloat(S.rF.amt)}:r);
  else S.rec=[...S.rec,{id:uid(),...S.rF,amt:parseFloat(S.rF.amt)}];
  sv();S.editRid=null;S.showRF=false;toast(wasEdit?"Bill updated ✓":"Bill added 🔁");render();
}
function togPause(id){S.pau={...S.pau};if(S.pau[id])delete S.pau[id];else S.pau[id]=true;sv();render();}
function delRec(id){const del=S.rec.find(r=>String(r.id)===String(id));S.rec=S.rec.filter(r=>String(r.id)!==String(id));sv();toast("Removed","ok",()=>{S.rec=[...S.rec,del];sv();render();});render();}

// Dues
function togUF(){if(S.showUF){S.editUid=null;S.uF={name:"",amt:"",cat:CATS[0].name,due:today()};}S.showUF=!S.showUF;render();}
function editUpc(id){const u=S.upc.find(x=>String(x.id)===String(id));if(!u)return;S.editUid=id;S.uF={name:u.name,amt:String(u.amount),cat:u.cat||u.category,due:u.due};S.showUF=true;render();}
function saveUpc(){
  if(!S.uF.name.trim()||!S.uF.amt||+S.uF.amt<=0){toast("Fill in all fields","err");return;}
  const wasEdit=!!S.editUid;
  const entry={name:S.uF.name,amount:parseFloat(S.uF.amt),cat:S.uF.cat,category:S.uF.cat,due:S.uF.due};
  if(S.editUid)S.upc=S.upc.map(u=>String(u.id)===String(S.editUid)?{...u,...entry}:u);
  else S.upc=[...S.upc,{id:uid(),...entry}];
  sv();S.editUid=null;S.showUF=false;toast(wasEdit?"Updated ✓":"Added ✦");render();
}
function delUpc(id){const del=S.upc.find(u=>String(u.id)===String(id));S.upc=S.upc.filter(u=>String(u.id)!==String(id));sv();toast("Removed","ok",()=>{S.upc=[del,...S.upc];sv();render();});render();}
function logUpc(id){
  const u=S.upc.find(x=>String(x.id)===String(id));if(!u)return;
  const eid=uid();
  S.exp=[{id:eid,amount:u.amount,description:u.name,category:u.cat||u.category||"Other",date:today(),notes:"📅 From upcoming"},...S.exp];
  S.upc=S.upc.filter(x=>String(x.id)!==String(id));
  sv();vib(8);toast("Logged as expense ✓");render();
}

// Income
function togIF(){if(S.showIF){S.editIid=null;S.iF={desc:"",amt:"",src:"Salary",date:today()};}S.showIF=!S.showIF;render();}
function editInc(id){const i=S.inc.find(x=>String(x.id)===String(id));if(!i)return;S.editIid=id;S.iF={desc:i.description,amt:String(i.amount),src:i.src||i.source||"Salary",date:i.date};S.showIF=true;render();}
function saveInc(){
  if(!S.iF.desc.trim()||!S.iF.amt||+S.iF.amt<=0){toast("Fill in all fields","err");return;}
  const wasEdit=!!S.editIid;
  const entry={description:S.iF.desc,amount:parseFloat(S.iF.amt),src:S.iF.src,source:S.iF.src,date:S.iF.date};
  if(S.editIid)S.inc=S.inc.map(i=>String(i.id)===String(S.editIid)?{...i,...entry}:i);
  else S.inc=[{id:uid(),...entry},...S.inc];
  sv();S.editIid=null;S.showIF=false;vib(8);toast(wasEdit?"Income updated ✓":"Income logged ✓");render();
}
function delInc(id){const del=S.inc.find(i=>String(i.id)===String(id));S.inc=S.inc.filter(i=>String(i.id)!==String(id));sv();toast("Removed","ok",()=>{S.inc=[del,...S.inc];sv();render();});render();}

// Search
function openSearch(){
  $("sov").classList.add("open");
  $("sres").innerHTML=`<div class="empty"><div class="ei">🔍</div><p>Search by description,<br/>category or notes</p></div>`;
  setTimeout(()=>$("sinp").focus(),200);
}
function closeSearch(){$("sov").classList.remove("open");$("sinp").value="";$("sres").innerHTML="";}
function doSearch(){
  const q=$("sinp").value.trim().toLowerCase();
  if(!q){$("sres").innerHTML=`<div class="empty"><div class="ei">🔍</div><p>Search by description,<br/>category or notes</p></div>`;return;}
  const res=S.exp.filter(e=>e.description.toLowerCase().includes(q)||(e.notes||"").toLowerCase().includes(q)||e.category.toLowerCase().includes(q)).sort((a,b)=>b.date.localeCompare(a.date));
  $("sres").innerHTML=res.length===0?`<div class="empty"><div class="ei">◎</div><p>No results for "${xe(q)}"</p></div>`
  :`<div style="font-family:JetBrains Mono,monospace;font-size:.52rem;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">${res.length} result${res.length!==1?"s":""}</div>${res.map(e=>erow(e)).join("")}`;
}

// Notifications
async function togNotif(){
  if(S.notifOn&&S.notifPerm==="granted"){S.notifOn=false;LS.s("nfx",false);render();toast("Reminders off");return;}
  if(!("Notification" in window)){toast("Not supported","err");return;}
  const p=await Notification.requestPermission();S.notifPerm=p;
  if(p==="granted"){S.notifOn=true;LS.s("nfx",true);toast("Reminders enabled 🔔");doNotif();}
  else toast("Permission denied","err");
  render();
}

// Backup / Export
function showBackup(){
  $("ova").innerHTML=`<div class="ov" onclick="if(event.target===this)closeOv()">
    <div class="sht" onclick="event.stopPropagation()">
      <div class="pill"></div>
      <div class="stitle">Backup & Restore</div>
      <div class="ssub">Keep your data safe. Export a backup and restore anytime.</div>
      <button class="btn" onclick="expBackup()">⬇ Export Backup (.json)</button>
      <label style="cursor:pointer;display:block;margin-top:4px"><div class="btn ghost" style="text-align:center">⬆ Import Backup</div><input type="file" accept=".json" style="display:none" onchange="impBackup(this)"/></label>
      <button class="btn grn" onclick="expCSV()">⬇ Export CSV (spreadsheet)</button>
      <button class="btn ghost" onclick="closeOv()">Close</button>
    </div></div>`;
}
function closeOv(){$("ova").innerHTML="";}

function expCSV(){
  const q=s=>'"'+String(s||"").replace(/"/g,'""')+'"';
  const rows=[["Date","Description","Category","Amount","Notes"],...S.exp.map(e=>[e.date,q(e.description),e.category,e.amount.toFixed(2),q(e.notes)])];
  const blob=new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ledger-${today()}.csv`;a.click();
  URL.revokeObjectURL(a.href);closeOv();toast("CSV downloaded 📥");
}
function expBackup(){
  const data={v:3,exported:today(),expenses:S.exp,recurring:S.rec,upcoming:S.upc,income:S.inc,budget:S.bud,goal:S.goal,paused:S.pau};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ledger-backup-${today()}.json`;a.click();
  URL.revokeObjectURL(a.href);closeOv();toast("Backup downloaded 💾");
}
function impBackup(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.expenses&&!data.exp)throw new Error("Invalid");
      S.exp=data.expenses||data.exp||[];S.rec=data.recurring||data.rec||[];
      S.upc=data.upcoming||data.upc||[];S.inc=data.income||data.inc||[];
      if(data.budget||data.bud)S.bud=data.budget||data.bud;
      if(data.goal)S.goal=data.goal;
      if(data.paused||data.pau)S.pau=data.paused||data.pau||{};
      sv();closeOv();toast(`Restored ${S.exp.length} expenses ✓`);render();
    }catch{toast("Invalid backup file","err");}
  };
  reader.readAsText(file);
}

// ── Event listeners ───────────────────────────────────────
$("fab").onclick=()=>openAdd();
$("aclose").onclick=closeAdd;
$("asub").onclick=submitAdd;
$("bthm").onclick=()=>{S.dark=!S.dark;LS.s("thm",S.dark);const tc=document.getElementById("tc");if(tc)tc.content=S.dark?"#0A0A0F":"#F4F4FA";render();};
$("bsrch").onclick=openSearch;
$("bbak").onclick=showBackup;
$("bnot").onclick=togNotif;
$("sinp").oninput=doSearch;
$("scan").onclick=closeSearch;
$("famt").onkeydown=e=>{if(e.key==="Enter")$("fdesc").focus();};
$("fdesc").onkeydown=e=>{if(e.key==="Enter")submitAdd();};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if($("as").classList.contains("open")){closeAdd();return;}
    if($("sov").classList.contains("open")){closeSearch();return;}
    if($("ova").innerHTML){closeOv();return;}
  }
});

// ── Boot ──────────────────────────────────────────────────
load();
</script>
